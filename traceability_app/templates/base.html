<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Rückverfolgbarkeit{% endblock %}</title>
  <style>
    :root {
      --mb-blue: #002d5c;      /* dunkles Corporate-Blau */
      --mb-accent: #00b1eb;    /* Miltenyi-typisches Hellblau */
      --mb-bg: #f4f6f8;
      --mb-border: #dde3e8;
      --mb-text: #1d2b36;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: var(--mb-bg); color: var(--mb-text); }
    header { background: var(--mb-blue); color: #fff; padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 60px; }
    header .logo { font-weight: 700; letter-spacing: .5px; font-size: 1.05rem; }
    header .logo .dots span { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: 3px; }
    header nav a { color: #cfe6f5; text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: .95rem; }
    header nav a.active, header nav a:hover { background: rgba(255,255,255,.12); color: #fff; }
    main { max-width: 1100px; margin: 28px auto; padding: 0 20px; }
    .card { background: #fff; border: 1px solid var(--mb-border); border-radius: 8px; padding: 22px; margin-bottom: 20px; }
    h1 { font-size: 1.3rem; margin: 0 0 4px; color: var(--mb-blue); }
    .subtitle { color: #5f7180; font-size: .9rem; margin-bottom: 18px; }
    label { display: block; font-size: .8rem; color: #5f7180; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 10px; border: 1px solid var(--mb-border); border-radius: 5px; font-size: .9rem; background: #fff; }
    input:focus, select:focus { outline: 2px solid var(--mb-accent); border-color: transparent; }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th { text-align: left; color: #5f7180; font-weight: 600; font-size: .78rem; text-transform: uppercase; letter-spacing: .4px; padding: 8px 10px; border-bottom: 2px solid var(--mb-border); }
    td { padding: 7px 10px; border-bottom: 1px solid var(--mb-border); }
    tr:hover td { background: #f0f8fc; }
    .btn { background: var(--mb-accent); color: #fff; border: 0; border-radius: 5px; padding: 10px 22px; font-size: .95rem; cursor: pointer; }
    .btn:hover { background: #009cd1; }
    .btn.secondary { background: #fff; color: var(--mb-blue); border: 1px solid var(--mb-border); }
    .flash { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: .9rem; }
    .flash.success { background: #e3f6e8; color: #17632c; border: 1px solid #b8e4c3; }
    .flash.error { background: #fdeaea; color: #97231f; border: 1px solid #f2c4c2; }
    .table-wrap { overflow-x: auto; }
  </style>
</head>
<body>
<header>
  <div class="logo">Production Tools
    <span class="dots">
      <span style="background:#e6007e"></span><span style="background:#f39200"></span><span style="background:#ffd500"></span><span style="background:#95c11f"></span><span style="background:#00b1eb"></span>
    </span>
  </div>
  <nav>
    <a href="{{ url_for('entry') }}" class="{{ 'active' if active == 'entry' }}">Dateneingabe</a>
    <a href="{{ url_for('dashboard') }}" class="{{ 'active' if active == 'dashboard' }}">Dashboard</a>
  </nav>
</header>
<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}<div class="flash {{ cat }}">{{ msg }}</div>{% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
